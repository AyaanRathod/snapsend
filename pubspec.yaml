name: snap_spend
description: "SnapSpend – AI-powered budgeting & receipt scanning app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── State Management ──────────────────────────────────────────
  provider: ^6.1.2

  # ── Local Database (Hive / NoSQL) ────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── ML Kit ───────────────────────────────────────────────────
  google_mlkit_document_scanner: ^0.1.0
  google_mlkit_text_recognition: ^0.13.0

  # ── Data Visualization ────────────────────────────────────────
  fl_chart: ^0.68.0

  # ── Utilities ────────────────────────────────────────────────
  uuid: ^4.3.3
  intl: ^0.19.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # ── Hive Code Generation ──────────────────────────────────────
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

  # ── App Icon Generation ───────────────────────────────────────
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
